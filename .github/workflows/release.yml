name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-multi-arch:
    name: build + push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository_owner }}/dnmbcluster"
          REPO_LOWER="$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "image=$REPO_LOWER" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version_tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
            echo "version_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "latest_tag=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.latest_tag }}
