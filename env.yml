name: dnmb
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # Interpreters
  - python=3.11
  - r-base=4.4

  # Clustering engines (usearch12 compiled separately in Dockerfile Stage 1)
  - mmseqs2=15.6f452
  - cd-hit=4.8.1
  - diamond=2.1.9

  # Python scientific stack
  - biopython>=1.83
  - polars>=0.20
  - pyarrow>=15
  - pandas>=2.2
  - click>=8.1
  - numpy
  - scipy

  # R visualization stack (only packages actually imported by DNMBcluster R pkg)
  - r-arrow
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-tibble
  - r-magrittr
  - r-scales

  # Build tooling
  - pip
