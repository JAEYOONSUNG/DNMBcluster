name: dnmb
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # Interpreters
  - python=3.11
  - r-base>=4.2

  # Clustering engines (usearch12 compiled separately in Dockerfile Stage 1)
  - mmseqs2>=15
  - cd-hit>=4.8
  - diamond>=2.1

  # Phylogenomics + similarity (opt-in stages via --phylo / --ani)
  - mafft
  - iqtree>=2
  - trimal
  - skani

  # Python scientific stack
  - biopython>=1.83
  - polars>=0.20
  - pyarrow>=15
  - pandas>=2.2
  - click>=8.1
  - numpy
  - scipy
  - xlsxwriter
  - openpyxl

  # R visualization stack — core
  - r-arrow
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-tibble
  - r-magrittr
  - r-scales
  - r-ggnewscale

  # R visualization stack — extended plots
  # r-eulerr is installed from CRAN in the Dockerfile runtime stage —
  # conda-forge ships no linux-aarch64 build for it, so listing it here
  # breaks the arm64 image. The CRAN source compile works on both archs
  # since build-essential is already present in the runtime layer.
  - r-ape
  - r-phangorn
  - r-gggenes
  - r-pheatmap
  - r-ggdendro
  - bioconductor-ggtree
  - bioconductor-treeio

  # Build tooling
  - pip
