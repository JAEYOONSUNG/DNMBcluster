name: dnmb
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  # Interpreters
  - python=3.11
  - r-base>=4.2

  # Clustering engines (usearch12 compiled separately in Dockerfile Stage 1)
  - mmseqs2>=15
  - cd-hit>=4.8
  - diamond>=2.1

  # Phylogenomics + similarity (opt-in stages via --phylo / --ani).
  # The aligner / trimmer / tree-builder modules auto-pick the best
  # tool on PATH; priority is FAMSA > MUSCLE5 > MAFFT for alignment,
  # ClipKIT > trimAl for trimming, and iqtree3 > iqtree2 > iqtree
  # for ML phylogenetics. MAFFT/trimAl/iqtree are kept as universal
  # fallbacks so stripped-down installs still produce a tree.
  - famsa
  - muscle>=5
  - mafft
  - clipkit
  - trimal
  - iqtree>=3
  - skani
  - mcl
  - hyphy          # FEL / BUSTED selection analysis
  # Modern comparative-genomics engines used by the SOTA wrappers.
  # All four have bioconda builds for linux-64/linux-aarch64/osx-64/
  # osx-arm64 (verified 2026-04). The R wrappers still Sys.which-guard
  # so local (non-docker) installs missing a binary won't crash.
  - foldseek
  - generax
  - paml

  # Python scientific stack
  - biopython>=1.83
  - polars>=0.20
  - pyarrow>=15
  - pandas>=2.2
  - click>=8.1
  - numpy
  - scipy
  - xlsxwriter
  - openpyxl

  # R visualization stack — core
  - r-arrow
  - r-ggplot2
  - r-dplyr
  - r-tidyr
  - r-tibble
  - r-magrittr
  - r-scales
  - r-ggnewscale

  # R visualization stack — extended plots
  # r-eulerr + r-mcl are installed from CRAN in the Dockerfile runtime
  # stage. r-eulerr has no linux-aarch64 conda build; r-mcl is absent
  # from conda-forge entirely. Both are pure-R (or small C++) and
  # compile fine with build-essential already present in runtime.
  - r-ape
  - r-phangorn
  - r-gggenes
  - r-pheatmap
  - r-ggdendro
  - r-igraph
  - r-bit64
  - r-future
  - r-future.apply
  - bioconductor-ggtree
  - bioconductor-treeio
  - bioconductor-biostrings
  - bioconductor-decipher

  # Build tooling
  - pip
